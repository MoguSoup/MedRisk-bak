server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: medrisk-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/medrisk?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:medrisk_app}
    password: ${SPRING_DATASOURCE_PASSWORD:ChangeMe_2026!}
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:256MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:256MB}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

medrisk:
  model-service-url: ${MEDRISK_MODEL_SERVICE_URL:http://localhost:8090}
  jwt-secret: ${MEDRISK_JWT_SECRET:replace-with-at-least-32-characters}
  report-dir: ${MEDRISK_REPORT_DIR:reports}
  upload-dir: ${MEDRISK_UPLOAD_DIR:uploads}
  training-output-dir: ${MEDRISK_TRAINING_OUTPUT_DIR:models/training}
  neo4j:
    uri: ${MEDRISK_NEO4J_URI:bolt://localhost:7687}
    username: ${MEDRISK_NEO4J_USERNAME:neo4j}
    password: ${MEDRISK_NEO4J_PASSWORD:medrisk-neo4j}
    database: ${MEDRISK_NEO4J_DATABASE:neo4j}
  llm:
    base-url: ${MEDRISK_LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${MEDRISK_LLM_API_KEY:}
    model: ${MEDRISK_LLM_MODEL:qwen-plus}
    vision-model: ${MEDRISK_VISION_MODEL:}
