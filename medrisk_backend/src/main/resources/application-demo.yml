spring:
  datasource:
    url: jdbc:h2:file:./data/medrisk-demo;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 2
    validate-on-migrate: false
  mail:
    host: ${MEDRISK_MAIL_HOST:smtp.163.com}
    port: ${MEDRISK_MAIL_PORT:465}
    username: ${MEDRISK_MAIL_USERNAME:}
    password: ${MEDRISK_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MEDRISK_MAIL_AUTH:true}
          auth.mechanisms: ${MEDRISK_MAIL_AUTH_MECHANISMS:LOGIN}
          starttls:
            enable: ${MEDRISK_MAIL_STARTTLS:false}
          ssl:
            enable: ${MEDRISK_MAIL_SSL:true}
            trust: ${MEDRISK_MAIL_SSL_TRUST:smtp.163.com}
          connectiontimeout: ${MEDRISK_MAIL_CONNECTION_TIMEOUT_MS:10000}
          timeout: ${MEDRISK_MAIL_READ_TIMEOUT_MS:10000}
          writetimeout: ${MEDRISK_MAIL_WRITE_TIMEOUT_MS:10000}
  servlet:
    multipart:
      max-file-size: 256MB
      max-request-size: 256MB
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

medrisk:
  model-service-url: http://127.0.0.1:8090
  jwt-secret: demo-secret-that-is-long-enough-for-hmac
  report-dir: reports
  upload-dir: uploads
  training-output-dir: models/training
  public-dataset-dir: ${MEDRISK_PUBLIC_DATASET_DIR:data/processed}
  http:
    connect-timeout-ms: ${MEDRISK_HTTP_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${MEDRISK_HTTP_READ_TIMEOUT_MS:20000}
  neo4j:
    uri: ${MEDRISK_NEO4J_URI:bolt://localhost:7687}
    username: ${MEDRISK_NEO4J_USERNAME:neo4j}
    password: ${MEDRISK_NEO4J_PASSWORD:medrisk-neo4j}
    database: ${MEDRISK_NEO4J_DATABASE:neo4j}
  llm:
    base-url: ${MEDRISK_LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${MEDRISK_LLM_API_KEY:}
    model: ${MEDRISK_LLM_MODEL:qwen-plus}
    vision-model: ${MEDRISK_VISION_MODEL:qwen3.5-omni-plus-2026-03-15}
    image-model: ${MEDRISK_IMAGE_MODEL:wanx-v1}
  hf-llm:
    enabled: ${MEDRISK_HF_LLM_ENABLED:false}
  mail:
    from: ${MEDRISK_MAIL_FROM:${MEDRISK_MAIL_USERNAME:}}
    skip-send: ${MEDRISK_MAIL_SKIP_SEND:false}
    test-code: ${MEDRISK_MAIL_TEST_CODE:}
